<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IRZplus Asystent - test formularza raportu</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; color: #20272d; background: #fff; }
    header { min-height: 72px; border-bottom: 1px solid #e0e4e7; padding: 22px 34px; font-weight: 700; color: #176a5b; }
    main { max-width: 760px; margin: 0 auto; padding: 34px 28px 90px; }
    h1 { margin: 0 0 32px; font-size: 30px; font-weight: 500; }
    form { display: grid; gap: 18px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input, select { width: 100%; height: 40px; border: 1px solid #818b93; padding: 0 11px; font: inherit; }
    .dates { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .run { justify-self: end; min-height: 40px; border: 0; padding: 0 18px; background: #0b5cab; color: #fff; font-weight: 700; }
    @media (max-width: 680px) { .dates { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>IRZplus - fikcyjna strona testowa</header>
  <main>
    <h1>Uruchomienie generowania raportu</h1>
    <form>
      <label for="reportType">Typ raportu pomocniczego
        <select id="reportType"><option>Raport terminowości zgłoszeń</option></select>
      </label>
      <label for="activity">Numer działalności
        <input id="activity" placeholder="NNNNNNNNN-NNN">
      </label>
      <label for="species">Gatunek
        <select id="species"><option value="">Wybierz gatunek zwierzęcia</option><option>Bydło</option></select>
      </label>
      <div class="dates">
        <label for="receivedFrom">Data wpływu od<input id="receivedFrom" placeholder="DD-MM-RRRR"></label>
        <label for="receivedTo">Data wpływu do<input id="receivedTo" placeholder="DD-MM-RRRR"></label>
        <label for="eventFrom">Data zdarzenia od<input id="eventFrom" placeholder="DD-MM-RRRR"></label>
        <label for="eventTo">Data zdarzenia do<input id="eventTo" placeholder="DD-MM-RRRR"></label>
      </div>
      <button class="run" type="button">Uruchom</button>
    </form>
  </main>
  <script src="rozszerzenie/content.js"></script>
</body>
</html>
